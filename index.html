<title>EC事業部　各モール店舗別 損益表</title>
<style>
  :root{
    --ink:#16202e; --ink-soft:#3a4a5e; --line:#dfe3df; --line-strong:#c4cbc4;
    --paper:#f5f6f3; --card:#ffffff; --muted:#76817a;
    --pos:#0f766e; --neg:#b4231f; --accent:#1f6f8b;
    --rakuten:#bf0000; --amazon:#d97706; --yahoo:#c40d0d; --own:#3f7a34;
    --sec:#eef1ee;
    --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
    --sans:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:20;background:var(--ink);color:#fff;border-bottom:3px solid var(--accent)}
  .bar{display:flex;align-items:center;gap:14px;padding:13px 20px 11px}
  .brandlogo{height:40px;width:auto;max-width:210px;flex:0 0 auto;display:block}
  .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#2f7d95,#0f766e);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff;
    box-shadow:0 3px 12px rgba(0,0,0,.28);flex:0 0 auto;letter-spacing:.02em}
  .brand{display:flex;flex-direction:column;gap:3px;min-width:0}
  .company{font-size:13px;font-weight:700;letter-spacing:.06em;color:#eaf2f8;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .dept{font-size:11px;font-weight:700;letter-spacing:.05em;background:var(--accent);color:#fff;padding:2px 10px;border-radius:20px;white-space:nowrap}
  .titles{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .bar h1{margin:0;font-size:17px;font-weight:700;letter-spacing:.04em;color:#fff}
  .bar .sub{font-size:11px;color:#9fb0c0;letter-spacing:.06em;font-weight:400}
  .hbtn{margin-left:auto;appearance:none;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.10);
    color:#fff;font-family:var(--sans);font-size:12px;font-weight:700;padding:8px 13px;border-radius:9px;cursor:pointer;white-space:nowrap;flex:0 0 auto}
  .hbtn:hover{background:rgba(255,255,255,.2)}
  .viewer .edit-only{display:none!important}
  nav{display:flex;gap:2px;overflow-x:auto;padding:0 12px 0}
  nav button{appearance:none;border:0;background:transparent;color:#aebccb;font-family:var(--sans);
    font-size:13px;font-weight:600;padding:9px 14px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s}
  nav button:hover{color:#fff}
  nav button.on{color:#fff;border-bottom-color:#fff}
  main{max-width:1180px;margin:0 auto;padding:22px 16px 80px}
  .page{display:none;animation:fade .25s ease}
  .page.on{display:block}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){.page{animation:none}}

  /* menu */
  .menu-hero{background:var(--ink);color:#fff;border-radius:14px;padding:26px 26px 22px;margin-bottom:20px}
  .menu-hero h2{margin:0 0 4px;font-size:22px;letter-spacing:.02em}
  .menu-hero p{margin:0;color:#9fb0c0;font-size:13px;max-width:none;text-align:justify;text-justify:inter-character;line-height:1.7}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .tile{display:block;text-align:left;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--accent);
    border-radius:11px;padding:15px 16px;cursor:pointer;transition:.15s;font-family:var(--sans)}
  .tile:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(20,30,45,.10);border-color:var(--line-strong)}
  .tile .t{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
  .tile .d{font-size:12px;color:var(--muted);margin-top:5px}
  .tile.rakuten{border-left-color:var(--rakuten)} .tile.amazon{border-left-color:var(--amazon)}
  .tile.yahoo{border-left-color:var(--yahoo)} .tile.own{border-left-color:var(--own)}
  .tile.summary{border-left-color:var(--pos)} .tile.guide{border-left-color:#8a948c}

  /* store header readout */
  .sheet-head{display:flex;flex-wrap:wrap;align-items:flex-end;gap:18px;margin-bottom:0;position:sticky;top:var(--stick,104px);z-index:12;background:var(--paper);padding:10px 4px 8px;border-bottom:1px solid var(--line)}
  .sheet-head .name{font-size:20px;font-weight:800;letter-spacing:.02em;display:flex;align-items:center;gap:9px}
  .dot{width:13px;height:13px;border-radius:3px;display:inline-block}
  .readout{margin-left:auto;text-align:right}
  .readout .lab{font-size:11px;color:var(--muted);letter-spacing:.08em}
  .readout .val{font-size:26px;font-weight:800;font-family:var(--mono);font-variant-numeric:tabular-nums}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .chart-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--ink)}
  .pos{color:var(--pos)} .neg{color:var(--neg)}
  .paren{font-size:.72em;font-weight:600}

  .scroll{overflow:visible;border:1px solid var(--line);border-radius:11px;background:var(--card)}
  table{border-collapse:separate;border-spacing:0;width:100%;min-width:760px}
  th,td{padding:7px 9px;font-size:13px;text-align:right;border-bottom:1px solid var(--line)}
  thead th{position:sticky;top:var(--stick2,168px);background:var(--ink);color:#fff;font-weight:600;z-index:9;text-align:right;padding:4px 8px;font-size:12px;line-height:1.2}
  thead th:first-child{text-align:left;left:0;z-index:11}
  .rowlabel{text-align:left;position:sticky;left:0;background:var(--card);font-weight:500;z-index:2;border-right:1px solid var(--line);min-width:170px}
  tr.section td{background:var(--sec);font-weight:800;color:var(--ink);letter-spacing:.03em;font-size:15px;padding-top:11px;padding-bottom:11px}
  tr.section .rowlabel{background:var(--sec)}
  tr.sub td{background:#f4f6f4;font-weight:700} tr.sub .rowlabel{background:#f4f6f4;font-weight:700}
  tr.gp td{background:#eaf3ea} tr.gp .rowlabel{background:#eaf3ea;font-weight:700}
  tr.op td{background:#fdeee4} tr.op .rowlabel{background:#fdeee4;font-weight:800}
  tr.kpi td{background:#eef4f7} tr.kpi .rowlabel{background:#eef4f7;font-weight:700}
  td.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  td.total{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;border-left:2px solid var(--line-strong);background:#fbfcfb}
  input{width:100%;border:1px solid transparent;background:transparent;text-align:right;font-family:var(--mono);
    font-variant-numeric:tabular-nums;font-size:13px;color:#0a3d91;padding:3px 4px;border-radius:5px}
  input:hover{border-color:var(--line)}
  input:focus{outline:none;border-color:var(--accent);background:#fffdf2;color:#16202e}
  td.inp{background:#fffef7}

  .tools{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
  .btn{appearance:none;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);
    font-family:var(--sans);font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;transition:.15s}
  .btn:hover{background:#eef1ee}
  .btn.warn{color:var(--neg);border-color:#e3bdbb}
  .subtab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}

  /* summary */
  .sumcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px}
  .sc{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px 16px}
  .sc .k{font-size:12px;color:var(--muted)} .sc .v{font-size:22px;font-weight:800;font-family:var(--mono);font-variant-numeric:tabular-nums;margin-top:3px}
  .sumtable td.store{font-weight:700;text-align:left;cursor:pointer;color:var(--accent)}
  .sumtable td.store:hover{text-decoration:underline}

  /* guide */
  .guide{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 24px 22px;max-width:860px}
  .guide h3{color:var(--ink);border-bottom:2px solid var(--sec);padding-bottom:6px;margin:22px 0 10px;font-size:15px}
  .guide p,.guide li{font-size:13px;color:var(--ink-soft)} .guide code{background:var(--sec);padding:1px 6px;border-radius:5px;font-size:12px}
  .back{font-size:12px;color:var(--ink);cursor:pointer;display:inline-block;margin-bottom:12px;
    border:1px solid var(--line-strong);background:var(--card);padding:7px 14px;border-radius:9px;font-weight:600;transition:.15s}
  .back:hover{background:var(--ink);color:#fff;border-color:var(--ink)}

  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;transition:.25s;z-index:50;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* import modal */
  #ov{position:fixed;inset:0;background:rgba(16,22,30,.55);display:none;z-index:60;padding:24px;overflow:auto}
  #ov.show{display:block}
  .modal{max-width:760px;margin:24px auto;background:var(--card);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden}
  .modal .mh{background:var(--ink);color:#fff;padding:15px 20px;display:flex;align-items:center;justify-content:space-between}
  .modal .mh h3{margin:0;font-size:16px} .modal .mh .x{cursor:pointer;font-size:20px;color:#9fb0c0}
  .modal .mb{padding:18px 20px}
  .modal .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
  .modal label{font-size:13px;font-weight:600}
  .modal select,.modal input[type=file]{font-family:var(--sans);font-size:13px;padding:7px 9px;border:1px solid var(--line-strong);border-radius:8px;background:#fff}
  .drop{border:2px dashed var(--line-strong);border-radius:11px;padding:18px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer}
  .drop.hot{border-color:var(--accent);background:#f1f7fa;color:var(--ink)}
  .note{font-size:12px;color:var(--muted);background:var(--sec);border-radius:8px;padding:10px 12px;line-height:1.6}
  .pv{margin-top:14px;border:1px solid var(--line);border-radius:10px;overflow:hidden;display:none}
  .pv.show{display:block}
  .pv .pvh{background:#eef1ee;padding:9px 12px;font-size:13px;font-weight:700}
  .pv .pscroll{overflow-x:auto;max-height:300px}
  .pv table{min-width:600px}
  .pv th,.pv td{font-size:12px;padding:5px 8px}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#e2efda;color:#386b2e;margin-left:8px}
  .err{color:var(--neg);font-size:13px;font-weight:600;margin-top:10px;display:none}
  .err.show{display:block}

  /* ===== スマートフォン最適化 ===== */
  @media (max-width:720px){
    .bar{flex-wrap:wrap;gap:10px;padding:10px 14px}
    .brandlogo{height:30px;max-width:150px}
    .company{font-size:11px;gap:7px}
    .dept{font-size:10px;padding:2px 8px}
    .bar h1{font-size:15px}
    .bar .sub{font-size:10px}
    .hbtn{margin-left:auto;font-size:11px;padding:7px 10px}
    nav{padding:0 8px}
    #nav button{font-size:13px;padding:9px 10px}
    main{padding:14px 10px 70px}
    .menu-hero{padding:16px 15px 15px;border-radius:12px;margin-bottom:16px}
    .menu-hero h2{font-size:18px}
    .menu-hero p{font-size:12px;line-height:1.6}
    .tiles{grid-template-columns:1fr;gap:10px}
    .sheet-head{gap:10px;margin-bottom:12px}
    .name{font-size:15px}
    .readout{margin-left:0}
    .readout .val{font-size:20px}
    .tools{gap:6px}
    .btn{font-size:12px;padding:8px 10px}
    /* スマホでも見出しを固定（PCと同じ）：横スクロール枠は使わずページごとスクロール */
    th,td{padding:7px 8px;font-size:12px}
    .rowlabel{min-width:132px}
    .card{padding:12px 12px}
    .chart-title{font-size:12px}
    #ov{padding:10px}
    .modal{margin:8px auto;max-width:100%}
    .mb{padding:14px}
    .pv table{min-width:520px}
  }
  @media (max-width:420px){
    .brandlogo{height:26px;max-width:120px}
    .company{font-size:10px}
    .hbtn{font-size:10px;padding:6px 8px}
    .menu-hero h2{font-size:16px}
    .readout .val{font-size:18px}
    th,td{font-size:11px;padding:6px 6px}
  }
</style>

function metricsD(ds,sid,m){
  const d=ds[sid];const g=k=>(+d[k][m]||0);
  const sales=g("uriage");
  const vc=g("genka")+g("tesuryo")+g("point")+g("kessai")+g("hasso")+g("agency");
  const gp=sales-vc;
  const ad=g("kokoku")+g("promo");
  const op=gp-ad;
  const kensu=g("kensu");
  const un=mm=>(d["uriage"]&&mm>=0&&mm<12?(+d["uriage"][mm]||0):0);
  const prevU=m>0?un(m-1):0;
  const uriageInc=(m>0 && prevU!==0 && un(m)!==0)?(un(m)-prevU):0;   // 今月−前月：前月と当月が入力済みのとき、当月側に差額を表示
  const fv=mm=>(d["fav"]&&mm>=0?(+d["fav"][mm]||0):0);
  const rv=mm=>(d["review"]&&mm>=0?(+d["review"][mm]||0):0);
  const fav=fv(m), review=rv(m);
  const favInc=m>0?fv(m)-fv(m-1):0, reviewInc=m>0?rv(m)-rv(m-1):0;
  const gg=k=>(d[k]?(+d[k][m]||0):0);
  const avU=gg("av_uriage"), avK=gg("av_kensu"), avA=gg("av_access"), avKok=gg("av_kokoku");
  const avCvr=avA?avK/avA:0, avAov=avK?avU/avK:0, avAdRate=avU?avKok/avU:0, avRoas=avKok?avU/avKok:0;
  return {sales,vc,gp,ad,op,kensu,fav,review,favInc,reviewInc,uriageInc,
    avU,avK,avA,avKok,avCvr,avAov,avAdRate,avRoas,
    gpRate:sales?gp/sales:0, opRate:sales?op/sales:0, adRate:sales?ad/sales:0,
    roas:g("kokoku")?sales/g("kokoku"):0, aov:kensu?sales/kensu:0};
}
function metrics(sid,m){ return metricsD(data,sid,m); }
function annual(sid){
  let a={sales:0,vc:0,gp:0,ad:0,op:0,kokoku:0,kensu:0,favInc:0,reviewInc:0,uriageInc:0,avU:0,avK:0,avA:0,avKok:0};
  for(let m=0;m<12;m++){const x=metrics(sid,m);a.sales+=x.sales;a.vc+=x.vc;a.gp+=x.gp;a.ad+=x.ad;a.op+=x.op;a.kokoku+=(+data[sid].kokoku[m]||0);a.kensu+=(+data[sid].kensu[m]||0);a.favInc+=x.favInc;a.reviewInc+=x.reviewInc;a.uriageInc+=x.uriageInc;a.avU+=x.avU;a.avK+=x.avK;a.avA+=x.avA;a.avKok+=x.avKok;}
  a.gpRate=a.sales?a.gp/a.sales:0;a.opRate=a.sales?a.op/a.sales:0;a.adRate=a.sales?a.ad/a.sales:0;a.roas=a.kokoku?a.sales/a.kokoku:0;a.aov=a.kensu?a.sales/a.kensu:0;
  a.avCvr=a.avA?a.avK/a.avA:0;a.avAov=a.avK?a.avU/a.avK:0;a.avAdRate=a.avU?a.avKok/a.avU:0;a.avRoas=a.avKok?a.avU/a.avKok:0;
  return a;
}

  if(total<=0){el.innerHTML='<div style="color:var(--muted);font-size:12px;padding:14px">表示できるデータ（プラスの値）がありません。</div>';return;}
  const W=300,H=210,cx=105,cy=105,r=82,ir=50; let ang=-Math.PI/2,paths="";
  pos.forEach(it=>{const a2=ang+(it.value/total)*Math.PI*2;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+ir*Math.cos(a2),yi1=cy+ir*Math.sin(a2),xi2=cx+ir*Math.cos(ang),yi2=cy+ir*Math.sin(ang);
    const large=(a2-ang)>Math.PI?1:0;
    paths+=`<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} L${xi1.toFixed(2)},${yi1.toFixed(2)} A${ir},${ir} 0 ${large} 0 ${xi2.toFixed(2)},${yi2.toFixed(2)} Z" style="fill:${it.color}"/>`;
    ang=a2;});
  const svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px;height:auto">${paths}<text x="${cx}" y="${cy-2}" text-anchor="middle" style="font-size:10px;fill:var(--muted)">合計</text><text x="${cx}" y="${cy+13}" text-anchor="middle" style="font-size:12px;font-weight:700;fill:var(--ink)">${fmt(total)}</text></svg>`;
  const legend=`<div style="display:flex;flex-direction:column;gap:3px;font-size:12px">`+pos.map(it=>`<div style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:2px;background:${it.color};display:inline-block"></span><span style="flex:1">${it.label}</span><span style="font-family:var(--mono);color:var(--muted)">${fmt(it.value)}（${(it.value/total*100).toFixed(1)}%）</span></div>`).join("")+`</div>`;
  el.innerHTML=`<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center"><div style="flex:0 0 auto">${svg}</div><div style="flex:1;min-width:220px">${legend}</div></div>`;
}
// per-store charts under its table
function renderVGroup(el,labels,series,kind){
  const fmtAx=AX[kind]||AX.yen;
  const W=700,H=260,L=56,R=14,T=14,B=30,iw=W-L-R,ih=H-T-B;
  let vals=[0]; series.forEach(s=>s.values.forEach(v=>vals.push(v)));
  let mx=Math.max(...vals),mn=Math.min(0,...vals); if(mx===mn)mx=mn+1;
  const pad=(mx-mn)*0.08; mx+=pad; if(mn<0)mn-=pad;
  const Y=v=>T+ih-(v-mn)/(mx-mn)*ih, zeroY=Y(0);
  const n=labels.length, gw=iw/n, sn=series.length, bw=Math.max(3,(gw*0.6)/sn);
  let g="";
  for(let k=0;k<=4;k++){const gv=mn+(mx-mn)*k/4,gy=Y(gv);
    g+=`<line x1="${L}" y1="${gy}" x2="${W-R}" y2="${gy}" style="stroke:var(--line)"/>`;
    g+=`<text x="${L-5}" y="${gy+3}" text-anchor="end" style="fill:var(--muted);font-size:10px">${fmtAx(gv)}</text>`;}
  if(mn<0)g+=`<line x1="${L}" y1="${zeroY}" x2="${W-R}" y2="${zeroY}" style="stroke:var(--line-strong)"/>`;
  labels.forEach((lb,i)=>{const cx=L+gw*i+gw/2;
    g+=`<text x="${cx}" y="${H-9}" text-anchor="middle" style="fill:var(--muted);font-size:10px">${lb}</text>`;
    const total=bw*sn+2*(sn-1), start=cx-total/2;
    series.forEach((s,si)=>{const v=s.values[i]||0,x=start+si*(bw+2),y=Math.min(zeroY,Y(v)),h=Math.max(1,Math.abs(Y(v)-zeroY));
      g+=`<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="2" style="fill:${s.color}"/>`;});
  });
  el.innerHTML=legendHTML(series)+`<svg viewBox="0 0 ${W} ${H}" width="100%" style="height:auto;font-family:var(--sans)">${g}</svg>`;
}
function renderMoM(el,labels,series){
  if(!el)return;
  const W=700,H=250,L=46,R=14,T=14,B=28,iw=W-L-R,ih=H-T-B;
  let vals=[0]; series.forEach(s=>s.values.forEach(v=>{if(isFinite(v))vals.push(v);}));
  let mx=Math.max(...vals),mn=Math.min(...vals); if(mx===mn){mx+=0.1;mn-=0.1;}
  const pad=(mx-mn)*0.12||0.1; mx+=pad; mn-=pad;
  const Y=v=>T+ih-(v-mn)/(mx-mn)*ih, zeroY=Y(0);
  const n=labels.length, gw=iw/n, series_n=series.length, bw=Math.max(3,(gw*0.62)/series_n);
  let g="";
  for(let k=0;k<=4;k++){const gv=mn+(mx-mn)*k/4,gy=Y(gv);
    g+=`<line x1="${L}" y1="${gy}" x2="${W-R}" y2="${gy}" style="stroke:var(--line)"/>`;
    g+=`<text x="${L-5}" y="${gy+3}" text-anchor="end" style="fill:var(--muted);font-size:10px">${(gv*100).toFixed(0)}%</text>`;}
  g+=`<line x1="${L}" y1="${zeroY}" x2="${W-R}" y2="${zeroY}" style="stroke:var(--line-strong)"/>`;
  labels.forEach((lb,i)=>{const cx=L+gw*i+gw/2;
    g+=`<text x="${cx}" y="${H-9}" text-anchor="middle" style="fill:var(--muted);font-size:10px">${lb}</text>`;
    const total=bw*series_n+2*(series_n-1), start=cx-total/2;
    series.forEach((s,si)=>{const v=s.values[i]; if(!isFinite(v))return;
      const x=start+si*(bw+2), y=Math.min(zeroY,Y(v)), h=Math.max(1,Math.abs(Y(v)-zeroY));
      g+=`<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="2" style="fill:${s.color}"/>`;});
  });
  el.innerHTML=legendHTML(series)+`<svg viewBox="0 0 ${W} ${H}" width="100%" style="height:auto;font-family:var(--sans)">${g}</svg>`;
}
function momArr(arr){const out=[];for(let i=1;i<12;i++){const p=arr[i-1];out.push(p>0?(arr[i]-p)/p:NaN);}return out;}
function drawStoreCharts(sid){

  renderMoM(document.getElementById("ch-mom-"+sid),MONTHS.slice(1),[

  ]);
}

function buildTable(sid){
  const t=document.getElementById("tb-"+sid);
  let h="<thead><tr><th>項目</th>"+MONTHS.map(m=>`<th>${m}</th>`).join("")+"<th>通期合計</th></tr></thead><tbody>";
  DISPLAY.forEach(row=>{
    if(row.type==="section"){
      h+=`<tr class="section"><td class="rowlabel">${row.label}</td>`+MONTHS.map(()=>"<td></td>").join("")+"<td></td></tr>";return;
    }
    h+=`<tr class="${row.type}"><td class="rowlabel">${row.label}</td>`;
    for(let m=0;m<12;m++){
      if(row.type==="in"){
        h+=`<td class="inp"><input inputmode="numeric" data-s="${sid}" data-k="${row.k}" data-m="${m}"></td>`;
      }else{
        h+=`<td class="num" data-calc="${sid}" data-f="${row.f}" data-m="${m}" data-fmt="${row.fmt||'yen'}"></td>`;
      }
    }
    h+=`<td class="total" data-tot="${sid}" data-f="${row.f||row.k}" data-fmt="${row.fmt||'yen'}" data-type="${row.type}"></td></tr>`;
  });
  h+="</tbody>";t.innerHTML=h;
  // fill inputs
  t.querySelectorAll("input").forEach(inp=>{
    const v=data[inp.dataset.s][inp.dataset.k][+inp.dataset.m];
    inp.value=inFmt(inp.dataset.k,v);
    inp.readOnly=!isAdmin;
    inp.addEventListener("input",onInput);
    inp.addEventListener("focus",onFocusInput);
    inp.addEventListener("blur",onBlurInput);
  });
  recalc(sid);
}

function onInput(e){
  const i=e.target;const v=parseFloat(String(i.value).replace(/[¥￥,\s　件]/g,""))||0;
  data[i.dataset.s][i.dataset.k][+i.dataset.m]=v;
  persist();recalc(i.dataset.s);
}
function onFocusInput(e){
  if(!isAdmin)return;
  const i=e.target;const v=data[i.dataset.s][i.dataset.k][+i.dataset.m];
  i.value=v?String(v):"";           // 編集中は数字のみ
  if(i.select)i.select();
}
function onBlurInput(e){
  const i=e.target;const v=data[i.dataset.s][i.dataset.k][+i.dataset.m];
  i.value=inFmt(i.dataset.k,v);     // 確定で書式に戻す（金額は¥、件数は数値）
}

function recalc(sid){
  // monthly calc cells
  document.querySelectorAll(`#tb-${sid} [data-calc="${sid}"]`).forEach(td=>{
    const m=+td.dataset.m;const x=metrics(sid,m);const val=x[td.dataset.f];
    td.textContent=fmtBy(td.dataset.fmt,val);colorCell(td,td.dataset.fmt,val,td.dataset.f);
  });
  // totals
  const a=annual(sid);
  document.querySelectorAll(`#tb-${sid} [data-tot="${sid}"]`).forEach(td=>{
    const f=td.dataset.f;let val;
    if(td.dataset.type==="in"){val=sum(data[sid][f]);}
    else{val=a[f];}
    td.textContent=fmtBy(td.dataset.fmt,val);colorCell(td,td.dataset.fmt,val,f);
  });
  // header readout
  const ro=document.getElementById("ro-"+sid);
  ro.textContent=yen(a.op);ro.className="val "+(a.op>0?"pos":a.op<0?"neg":"");
  drawStoreCharts(sid);
}
function fmtBy(fmt,v){return fmt==="pct"?pct(v):fmt==="mult"?mult(v):fmt==="yeninc"?yenInc(v):fmt==="cnt"?(Math.round(v||0).toLocaleString("ja-JP")+"件"):yen(v);}
function colorCell(td,fmt,v,f){
  td.classList.remove("pos","neg");
  if((f==="op"||f==="gp")&&fmt==="yen"){ if(v>0)td.classList.add("pos"); else if(v<0)td.classList.add("neg"); }
  if(f==="opRate"){ if(v>0)td.classList.add("pos"); else if(v<0)td.classList.add("neg"); }
  if(fmt==="yeninc"){ if(v<0)td.classList.add("neg"); }
}

}

const FIELD_LABEL=Object.fromEntries(INPUTS.map(r=>[r.k,r.label]));
function parseCSV(text){
  text=text.replace(/^\uFEFF/,"");const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{ if(c==='"')q=true; else if(c===","){row.push(cur);cur="";}
      else if(c==="\t"){row.push(cur);cur="";} else if(c==="\r"){}
      else if(c==="\n"){row.push(cur);rows.push(row);row=[];cur="";} else cur+=c; }
  }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(c=>String(c).trim()!==""));
}
function jnum(s){ if(s==null)return 0; s=String(s).replace(/[¥￥,\s　円％%]/g,"").trim();
  let neg=false; if(/^\(.*\)$/.test(s)){neg=true;s=s.slice(1,-1);} if(s[0]==="-"){neg=true;s=s.slice(1);}
  s=s.replace(/[０-９．]/g,d=>String("０１２３４５６７８９．".indexOf(d)).length?("0123456789.".charAt("０１２３４５６７８９．".indexOf(d))):d);
  const v=parseFloat(s); return isNaN(v)?0:(neg?-v:v); }
function parseMonth(s){ s=String(s).trim();
  let m=s.match(/(\d{4})\s*[-\/年.\s]\s*(\d{1,2})/); if(m)return +m[2];
  m=s.match(/^(\d{4})(\d{2})$/); if(m){const n=+m[2];if(n>=1&&n<=12)return n;}   // YYYYMM 例:202607
  m=s.match(/^\s*(\d{2})\s*[-\/年.]\s*(\d{1,2})\s*月?\s*$/); if(m)return +m[2];
  m=s.match(/^\s*(\d{1,2})\s*月/); if(m)return +m[1];
  m=s.match(/^\s*(\d{1,2})\s*$/); if(m){const n=+m[1];if(n>=1&&n<=12)return n;}
  return null; }
function detectField(h){ h=String(h); let best=null,len=0;
  FIELD_SYN.forEach(([k,arr])=>arr.forEach(syn=>{ if(h.indexOf(syn)>=0&&syn.length>len){best=k;len=syn.length;} })); return best; }
function matchStore(s){ s=String(s).trim();
  const norm=x=>String(x||"").replace(/[()（）\s]/g,"").toLowerCase();
  const ss=norm(s);
  // 1) match configured store names / codes (longest wins) so SOUYI/BLIST Yahoo! are distinguished
  let best=null,len=0;
  STORES.forEach(st=>{ [st.name,st.code].forEach(t=>{ const tt=norm(t);
    if(tt && ss.indexOf(tt)>=0 && tt.length>len){best=st.id;len=tt.length;} }); });
  if(best)return best;
  // 2) fallback to mall keywords
  if(/楽天|rakuten/i.test(s))return "rakuten";
  if(/amazon|アマゾン/i.test(s))return "amazon";
  if(/yahoo|ヤフ|paypay|ペイペイ/i.test(s))return "yahoo";
  if(/qoo10|キューテン|キュ－テン/i.test(s))return "qoo10";
  if(/wowma|ワウマ/i.test(s))return "wowma";
  if(/au ?pay|auペイ|auマーケット/i.test(s))return "aupay";
  if(/メルカリ|mercari/i.test(s))return "mercari";
  if(/電話|fax|fxa|ＴＥＬ|tel/i.test(s))return "phone";
  if(/自社|本店|公式|shopify|base|makeshop|future|ec|直販/i.test(s))return "own";
  return null; }

// build a plan: {storeId:{fieldKey:{monthIdx:value}}}, plus meta
function buildPlan(rows, defStore){
  if(!rows.length) throw "データがありません";
  const header=rows[0].map(c=>String(c).trim());
  const monthCols=header.map((h,i)=>({i,m:parseMonth(h)})).filter(o=>o.m);
  const fieldCols=header.map((h,i)=>({i,f:detectField(h)})).filter(o=>o.f);
  const storeColI=header.findIndex(h=>/店舗|ショップ|モール|shop|store|ストア|販売店/i.test(h));
  const labelColI=header.findIndex(h=>/項目|区分|内容|kind|item/i.test(h));
  const plan={};const touch=[];
  const put=(sid,f,m,v)=>{ if(!sid)return; (plan[sid]=plan[sid]||{}); (plan[sid][f]=plan[sid][f]||{});
    plan[sid][f][m]=(plan[sid][f][m]||0)+v; };
  let mode;
  if(monthCols.length>=2 && (labelColI>=0 || detectField(header[0]) || rows.some(r=>detectField(r[0])))){
    // WIDE: each row = one field (label col), months across columns
    mode="ワイド形式（項目×月）";
    const lc=labelColI>=0?labelColI:0;
    rows.slice(1).forEach(r=>{
      const f=detectField(r[lc]||""); if(!f)return;
      const sid=storeColI>=0?(matchStore(r[storeColI])||defStore):defStore;
      monthCols.forEach(({i,m})=>{ const v=jnum(r[i]); put(sid,f,slotOf(m),v); });
    });
  } else if(fieldCols.length>=1 && (monthCols.length===1 || header.some(h=>/年月|月度|日付|date|期間|計上日|受注日|出荷日/i.test(h)))){
    // LONG: rows = records, a date column + metric columns
    mode="ロング形式（明細×月集計）";
    let dateI=header.findIndex(h=>/年月|月度|計上日|受注日|出荷日|日付|date|期間/i.test(h));
    if(dateI<0 && monthCols.length===1) dateI=monthCols[0].i;
    if(dateI<0) throw "月（年月／日付）の列が見つかりませんでした";
    rows.slice(1).forEach(r=>{
      const mm=parseMonth(r[dateI]); if(!mm)return;
      const sid=storeColI>=0?(matchStore(r[storeColI])||defStore):defStore;
      fieldCols.forEach(({i,f})=>{ const v=jnum(r[i]); if(v!==0) put(sid,f,slotOf(mm),v); });
    });
  } else { throw "形式を判別できませんでした。月（1月〜12月／年月）の列と、売上・原価などの項目列が含まれているかご確認ください。"; }
  // collect touched
  Object.keys(plan).forEach(sid=>Object.keys(plan[sid]).forEach(f=>Object.keys(plan[sid][f]).forEach(m=>touch.push({sid,f,m:+m,v:plan[sid][f][m]}))));
  if(!touch.length) throw "取り込める数値が見つかりませんでした。列名や中身をご確認ください。";
  return {plan,touch,mode,stores:Object.keys(plan)};
}

function showErr(msg){const e=document.getElementById("imp-err");e.textContent="⚠ "+msg;e.classList.add("show");
  document.getElementById("imp-pv").classList.remove("show");document.getElementById("imp-apply").disabled=true;curPlan=null;}
function mergePlan(dst,src){ Object.keys(src).forEach(sid=>{dst[sid]=dst[sid]||{};
  Object.keys(src[sid]).forEach(f=>{dst[sid][f]=dst[sid][f]||{};
    Object.keys(src[sid][f]).forEach(m=>{dst[sid][f][m]=(dst[sid][f][m]||0)+src[sid][f][m];});});}); }
function handleFiles(fileList){
  document.getElementById("imp-err").classList.remove("show");
  const files=[...fileList]; if(!files.length)return;
  const globalDef=document.getElementById("imp-store").value; // "" or store id
  Promise.all(files.map(f=>new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res({name:f.name,text:r.result,ok:true});
    r.onerror=()=>res({name:f.name,ok:false});
    r.readAsText(f,"UTF-8");
  }))).then(results=>{
    impFiles=[];
    const merged={},fileMap=[],errs=[];
    results.forEach(fr=>{
      if(!fr.ok){errs.push(`${fr.name}：読み込み失敗`);return;}
      let rows; try{rows=parseCSV(fr.text);}catch(e){errs.push(`${fr.name}：解析失敗`);return;}
      impFiles.push({name:fr.name,rows});
      const fdef=matchStore(fr.name)||globalDef||null;   // 店舗列が無いファイルはファイル名→既定店舗で判定
      let res; try{res=buildPlan(rows,fdef);}catch(e){errs.push(`${fr.name}：${e}`);}
      if(res){mergePlan(merged,res.plan);fileMap.push({name:fr.name,stores:res.stores});}
    });
    if(impFiles.length)populateMapping(impFiles[0].rows);
    const stores=Object.keys(merged);
    if(!stores.length){
      showErr((errs.length?errs.join(" ／ ")+" ／ ":"")+"自動で取り込めませんでした。下の「列を手動で対応づける（詳細設定）」で列を指定してください。");
      document.getElementById("imp-map").style.display="block";
      return;
    }
    const touch=[];
    stores.forEach(sid=>Object.keys(merged[sid]).forEach(f=>Object.keys(merged[sid][f]).forEach(m=>touch.push({sid,f,m:+m,v:merged[sid][f][m]}))));
    curPlan={plan:merged,touch,stores,mode:(files.length>1?`一括取込（${files.length}ファイル）`:"CSV取込"),fileMap};
    if(errs.length){const e=document.getElementById("imp-err");e.textContent="⚠ 一部スキップ："+errs.join(" ／ ");e.classList.add("show");}
    renderPreview(curPlan);
  });
}
// ===== manual column mapping (全店舗一括の追加設定) =====
const MAPOPTS=[["","未使用"],["__store","店舗"],["__month","年月・日付"],["uriage","売上高"],["genka","商品原価"],["tesuryo","モール手数料"],["point","ポイント・クーポン"],["kessai","決済手数料"],["hasso","発送費"],["agency","代理店運営手数料"],["kokoku","広告費"],["promo","その他販促費"],["kensu","件数"],["fav","お気に入り登録数"],["review","商品レビュー数"],["av_uriage","広告経由 売上"],["av_kensu","広告経由 売上件数"],["av_access","アクセス人数"],["av_kokoku","広告経由 広告費"]];
function guessMap(h,sampleVal){
  const f=detectField(h); if(f)return f;
  if(/店舗|ショップ|モール|shop|store|ストア|販売店/i.test(h))return "__store";
  if(/年月|月度|日付|date|期間|計上|受注日|出荷日/i.test(h)||parseMonth(sampleVal))return "__month";
  return "";
}
function populateMapping(rows){
  const header=rows[0]||[],sample=rows[1]||[];
  document.getElementById("imp-maprows").innerHTML=header.map((h,i)=>{
    const def=guessMap(String(h).trim(),sample[i]);
    return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0">
      <span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${String(h)}">${String(h)||"(空欄列)"}</span>
      <select data-col="${i}" style="font-size:12px;padding:5px 7px;border:1px solid var(--line-strong);border-radius:7px;font-family:var(--sans);flex:0 0 auto">
        ${MAPOPTS.map(([v,t])=>`<option value="${v}" ${v===def?"selected":""}>${t}</option>`).join("")}
      </select></div>`;
  }).join("");
}
function buildFromMapping(){
  let storeCol=-1,monthCol=-1;const metricCols=[];
  document.querySelectorAll("#imp-maprows select").forEach(s=>{const i=+s.dataset.col,v=s.value;
    if(v==="__store")storeCol=i; else if(v==="__month")monthCol=i; else if(v)metricCols.push({i,f:v});});
  if(monthCol<0)throw "「年月・日付」の列を1つ指定してください";
  if(!metricCols.length)throw "売上・原価などの金額列を1つ以上指定してください";
  const globalDef=document.getElementById("imp-store").value;
  const merged={},fileMap=[];
  const put=(sid,f,m,v)=>{if(!sid)return;(merged[sid]=merged[sid]||{});(merged[sid][f]=merged[sid][f]||{});merged[sid][f][m]=(merged[sid][f][m]||0)+v;};
  impFiles.forEach(fr=>{const seen=new Set();
    fr.rows.slice(1).forEach(r=>{const mm=parseMonth(r[monthCol]);if(!mm)return;
      const sid=storeCol>=0?(matchStore(r[storeCol])||matchStore(fr.name)||globalDef):(matchStore(fr.name)||globalDef);
      metricCols.forEach(({i,f})=>{const v=jnum(r[i]);if(v!==0){put(sid,f,slotOf(mm),v);if(sid)seen.add(sid);}});});
    fileMap.push({name:fr.name,stores:[...seen]});});
  const stores=Object.keys(merged);
  if(!stores.length)throw "指定した列で取り込める数値が見つかりませんでした（店舗・年月・金額列の指定をご確認ください）";
  const touch=[];
  stores.forEach(sid=>Object.keys(merged[sid]).forEach(f=>Object.keys(merged[sid][f]).forEach(m=>touch.push({sid,f,m:+m,v:merged[sid][f][m]}))));
  return {plan:merged,touch,stores,mode:"手動対応で取込",fileMap};
}
function applyMapping(){
  document.getElementById("imp-err").classList.remove("show");
  let res; try{res=buildFromMapping();}catch(e){return showErr(String(e));}
  curPlan=res; renderPreview(res);
}
function renderPreview(res){
  const wrap=document.getElementById("imp-pv");
  const names=res.stores.map(s=>STORES.find(x=>x.id===s).name).join("・");
  let html=`<div class="pvh">検出：${res.mode}<span class="badge">対象店舗：${names}</span></div>`;
  if(res.fileMap&&res.fileMap.length>1||(res.fileMap&&res.fileMap.length===1&&res.fileMap[0].stores.length)){
    html+=`<div style="padding:8px 12px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line)">`+
      res.fileMap.map(fm=>`${fm.name} → ${fm.stores.map(s=>STORES.find(x=>x.id===s).name).join("・")||"(振り分け不可)"}`).join("<br>")+`</div>`;
  }
  html+=`<div class="pscroll"><table><thead><tr><th style="text-align:left">店舗 / 項目</th>`;
  MONTHS.forEach(lb=>html+=`<th>${lb}</th>`);
  html+="</tr></thead><tbody>";
  res.stores.forEach(sid=>{
    INPUTS.forEach(r=>{
      const mv=res.plan[sid][r.k]; if(!mv)return;
      html+=`<tr><td style="text-align:left">${STORES.find(x=>x.id===sid).name}・${r.label}</td>`;
      for(let m=0;m<12;m++){const v=mv[m];html+=`<td class="num">${v==null?"":yen(v)}</td>`;}
      html+="</tr>";
    });
  });
  html+="</tbody></table></div>";
  wrap.innerHTML=html;wrap.classList.add("show");
  document.getElementById("imp-apply").disabled=false;
}
function applyImport(){
  if(!curPlan)return;
  const toPrev=document.getElementById("imp-prev")&&document.getElementById("imp-prev").checked;
  if(toPrev){
    curPlan.touch.forEach(({sid,f,m,v})=>{ if(prev[sid]&&prev[sid][f]) prev[sid][f][m]=Math.round(v); });
    persistPrev();

  if(document.getElementById("pg-summary").classList.contains("on"))renderSummary();

  closeImport();toast(`取り込みました（${curPlan.stores.length}店舗）`);

}

function cloudLoad(manual){
  return new Promise(resolve=>{
    if(!CLOUD_URL){ if(manual)toast("共有保存URLが設定されていません"); resolve(false); return; }
    if(cloudLoading){ resolve(false); return; }
    cloudLoading=true;
    const st=document.getElementById("cl-status");
    if(manual&&st)st.textContent="読込中…";
    const cbName="__cloudCb"+Date.now();
    const timer=setTimeout(()=>{ finish(false,"タイムアウトしました"); },12000);
    let script;
    function finish(ok,msg){
      clearTimeout(timer); cloudLoading=false;
      try{ delete window[cbName]; }catch(e){}
      if(script&&script.parentNode)script.parentNode.removeChild(script);
      if(st)st.textContent=ok?("最終読込："+new Date().toLocaleString("ja-JP")):(msg||"読込に失敗しました");
      if(manual)toast(ok?"共有データを読み込みました":("読込に失敗しました"+(msg?"："+msg:"")));
      resolve(ok);
    }
    window[cbName]=function(res){
      try{
        const state=res&&res.state;
        if(!state || (!state.allData && !state.data)){ finish(false,"共有データはまだありません"); return; }
        const mergeArr=(dst,src)=>{ Object.keys(src).forEach(sid=>{ if(dst[sid]){ Object.keys(src[sid]).forEach(k=>{
          const a=src[sid][k]; if(Array.isArray(a)&&a.length===12) dst[sid][k]=a.map(v=>+v||0); }); } }); };
        if(state.allData){
          // 新形式：決算期ごとに分かれたデータをまとめて取り込む
          Object.keys(state.allData).forEach(k=>{ ensureYear_(k); mergeArr(allData[k],state.allData[k]); });
          if(state.allPrev) Object.keys(state.allPrev).forEach(k=>{ ensureYear_(k); mergeArr(allPrev[k],state.allPrev[k]); });
        } else if(state.data){
          // 旧形式（単年のみ）：保存時点の決算期（state.fy、無ければ現在の決算期）として取り込む
          const k=(state.fy&&state.fy.y&&state.fy.m)?fyKeyOf({y:+state.fy.y,m:+state.fy.m}):fyKeyOf(FY);
          ensureYear_(k); mergeArr(allData[k],state.data);
          if(state.prev) mergeArr(allPrev[k],state.prev);
        }
        persistLocalOnly_(); persistPrevLocalOnly_();
        // 表示中の決算期のポインタを最新の中身に合わせ直す
        ensureYear_(fyKeyOf(FY)); data=allData[fyKeyOf(FY)]; prev=allPrev[fyKeyOf(FY)];
        MONTHS=fyLabels();
        STORES.forEach(s=>{ buildTable(s.id); const p=document.getElementById("per-"+s.id); if(p)p.textContent="決算期："+fyRangeText(); });
        if(typeof syncFYrange==="function")syncFYrange();
        if(document.getElementById("pg-summary")&&document.getElementById("pg-summary").classList.contains("on"))renderSummary();
        if(document.getElementById("pg-analysis")&&document.getElementById("pg-analysis").classList.contains("on"))renderAnalysis();
        finish(true);
      }catch(err){ finish(false,"データの解析に失敗しました"); }
    };
    script=document.createElement("script");
    script.src=CLOUD_URL+(CLOUD_URL.indexOf("?")>=0?"&":"?")+"callback="+cbName+"&t="+Date.now();
    script.onerror=()=>finish(false,"通信に失敗しました");
    document.body.appendChild(script);
  });
}
// 反映専用（読込結果を書き戻す際に再度クラウド保存を予約しないための内部用）
function persistLocalOnly_(){ try{localStorage.setItem(ADK,JSON.stringify(allData));}catch(e){mem[ADK]=allData;} }
function persistPrevLocalOnly_(){ try{localStorage.setItem(APK,JSON.stringify(allPrev));}catch(e){mem[APK]=allPrev;} }
// 入力時：共有保存が有効なら、少し待ってからまとめてクラウドへ保存（連続入力での連打を防止）
function cloudScheduleSave(){
  if(cloudGet(CLK)!=="1")return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer=setTimeout(()=>cloudSaveNow(false),1500);
}
async function cloudSaveNow(manual){
  if(!CLOUD_URL){ if(manual)toast("共有保存URLが設定されていません"); return; }
  const st=document.getElementById("cl-status");
  if(manual&&st)st.textContent="保存中…";
  try{
    await fetch(CLOUD_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"save",allData,allPrev,fy:FY})});
    const now=new Date().toLocaleString("ja-JP");
    cloudSet(CLSK,now);
    if(st)st.textContent="最終保存："+now;
    if(manual)toast("共有保存しました");
  }catch(e){
    if(st)st.textContent="共有保存に失敗しました";
    if(manual)toast("共有保存に失敗しました");
  }
}

// ===== データ自動連携（連携URLから取得） =====
const SUK="pl_sync_url_v1", SAK="pl_sync_auto_v1", SLK="pl_sync_last_v1";
function syncGet(k){ try{return localStorage.getItem(k);}catch(e){return mem[k]||null;} }
function syncSet(k,v){ try{localStorage.setItem(k,v);}catch(e){mem[k]=v;} }
function applyPlanToData(res){
  res.touch.forEach(({sid,f,m,v})=>{ if(data[sid]&&data[sid][f]) data[sid][f][m]=Math.round(v); });
  persist();
  res.stores.forEach(sid=>{
    document.querySelectorAll(`#tb-${sid} input`).forEach(inp=>{const v=data[inp.dataset.s][inp.dataset.k][+inp.dataset.m];inp.value=inFmt(inp.dataset.k,v);});
    recalc(sid);
  });
  if(document.getElementById("pg-summary").classList.contains("on"))renderSummary();
  if(document.getElementById("pg-analysis").classList.contains("on"))renderAnalysis();
}
async function syncNow(manual){
  const url=(syncGet(SUK)||"").trim();
  const st=document.getElementById("sy-status");
  if(!url){ if(st)st.textContent="連携URLが未設定です。"; if(manual)toast("連携URLを入力してください"); return; }
  if(st)st.textContent="同期中…";
  try{
    const r=await fetch(url,{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const text=await r.text();
    const rows=parseCSV(text);
    const res=buildPlan(rows,null);
    applyPlanToData(res);
    const now=new Date().toLocaleString("ja-JP");
    syncSet(SLK,now);
    if(st)st.textContent="最終同期："+now+"（"+res.stores.length+"店舗）";
    if(manual)toast("同期しました（"+res.stores.length+"店舗）");
  }catch(e){
    const msg=String(e&&e.message||e);
    if(st)st.textContent="同期に失敗しました："+msg+"（URL公開設定・CORSをご確認ください）";
    if(manual)toast("同期に失敗しました");
  }
}
function openSync(){
  document.getElementById("sy-url").value=syncGet(SUK)||"";
  document.getElementById("sy-auto").checked=(syncGet(SAK)==="1");
  const last=syncGet(SLK); document.getElementById("sy-status").textContent=last?("最終同期："+last):"未同期";
  document.getElementById("cl-on").checked=(cloudGet(CLK)==="1");
  const clast=cloudGet(CLSK); document.getElementById("cl-status").textContent=clast?("最終保存："+clast):(CLOUD_URL?"未保存":"共有保存URLが未設定です");
  document.getElementById("sov").style.display="block";
}
(function(){

  sov.style.cssText="position:fixed;inset:0;background:rgba(16,22,30,.55);display:none;z-index:70;padding:16px;overflow:auto";

          <button class="btn" id="cl-load">今すぐ読み込む</button>
        </div>
      </div>

      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">連携URL（公開したCSV/GASのURL）を設定すると、そのデータを取り込みます。「自動同期」をONにすると、ページを開くたびに自動で最新に更新します。店舗列・年月・各項目の列があるCSVを想定しています（通常のCSV取込と同じ形式）。</div>

      <div style="background:#eef6f5;border:1px solid #cfe6e2;border-radius:10px;padding:12px 14px;margin-bottom:14px">

          <li><b>シートをCSVで公開</b>：スプレッドシートで「ファイル → 共有 → ウェブに公開 → 形式：CSV」を選び、公開されたCSVのURLをコピーします。</li>
          <li><b>ここに貼り付け</b>：下の「連携URL」にそのCSV URLを貼り付け、「自動同期」をON →「保存して今すぐ同期」を押します。以後は開くたびに自動反映されます。</li>
        </ol>
        <div style="font-size:11px;color:#6b6b6b;margin-top:8px">※ GitHub Pages（github.io）から取得するため、GASのURL直叩きはCORSで失敗する場合があります。<b>公開スプレッドシートのCSV URL</b>を使う方が確実です。<br>※ 自動で取れるのはNEにあるデータ（売上・送料・原価・手数料・ポイント・件数）です。<b>広告費・発送費・代理店運営手数料はNEに無い</b>ため、各店舗ページで手入力してください（連携では上書きされません）。</div>
      </div>

      <div class="row" style="align-items:flex-start"><label style="width:74px;padding-top:8px">連携URL</label>
        <input id="sy-url" placeholder="https://... （公開シートCSV or GAS）" style="flex:1;padding:8px 10px;border:1px solid var(--line-strong);border-radius:8px;font-family:var(--sans)"></div>
      <label style="display:flex;align-items:center;gap:7px;font-size:13px;margin:8px 0;cursor:pointer">
        <input type="checkbox" id="sy-auto"> 自動同期（このページを開くたびに取得）
      </label>
      <div id="sy-status" style="font-size:12px;color:var(--muted);margin:6px 0 2px">未同期</div>
      <div class="note" style="margin-top:10px">広告費・発送費・代理店運営手数料はネクストエンジンに無いため、連携では更新されません（各店舗ページで手入力してください）。取り込みは連携データに含まれる月・項目のみ上書きします。</div>
      <div class="tools" style="margin-bottom:0;margin-top:12px">
        <button class="btn" id="sy-save" style="border-color:#0f766e;color:#0f766e;font-weight:700">保存して今すぐ同期</button>
        <button class="btn" id="sy-savecfg">設定だけ保存</button>
        <button class="btn" id="sy-close">閉じる</button>
      </div>
    </div></div>`;
  document.body.appendChild(sov);
  const close=()=>sov.style.display="none";
  const saveCfg=()=>{ syncSet(SUK,document.getElementById("sy-url").value.trim()); syncSet(SAK,document.getElementById("sy-auto").checked?"1":"0"); };
  document.getElementById("sy-x").onclick=close;
  document.getElementById("sy-close").onclick=close;
  document.getElementById("sy-savecfg").onclick=()=>{saveCfg();toast("連携設定を保存しました");};
  document.getElementById("sy-save").onclick=()=>{saveCfg();syncNow(true);};
  document.getElementById("cl-on").onchange=e=>{ cloudSet(CLK,e.target.checked?"1":"0"); toast(e.target.checked?"共有保存をONにしました":"共有保存をOFFにしました"); };
  document.getElementById("cl-save").onclick=()=>cloudSaveNow(true);
  document.getElementById("cl-load").onclick=()=>cloudLoad(true);
  sov.addEventListener("click",e=>{if(e.target===sov)close();});
})();

applyMode();
show("menu");
// ページを開いたら、共有保存URLが設定されていれば（ログイン状態やチェックの有無に関係なく）常に最新データを読込。
// ※保存（書き込み）は引き続き「共有保存を使う」がONの端末のみ行います。
if(CLOUD_URL){ setTimeout(()=>cloudLoad(false),250); }
if(syncGet(SAK)==="1" && (syncGet(SUK)||"").trim()){ setTimeout(()=>syncNow(false),300); }
</script>
